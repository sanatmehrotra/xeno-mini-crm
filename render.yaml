# =============================================================================
# render.yaml — BrewBharat CRM — Render Blueprint (3 services)
# =============================================================================

services:

  # ── 1. CRM Backend (FastAPI) ──────────────────────────────────────────────
  - type: web
    name: brewbharat-crm-backend
    runtime: docker
    region: singapore
    plan: free
    rootDir: backend/crm-backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CHANNEL_SERVICE_URL
        sync: false
      - key: CHANNEL_HMAC_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AI_MODEL_FAST
        sync: false
      - key: AI_MODEL_SMART
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: ATTRIBUTION_WINDOW_HOURS
        sync: false

  # ── 2. Channel Service (FastAPI) ──────────────────────────────────────────
  - type: web
    name: brewbharat-channel-service
    runtime: docker
    region: singapore
    plan: free
    rootDir: backend/channel-service
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: CRM_CALLBACK_URL
        sync: false
      - key: HMAC_SECRET
        sync: false

  # ── 3. Frontend (Next.js) ─────────────────────────────────────────────────
  # NODE_VERSION and NODE_ENV are NOT secrets — hardcoded here so Render
  # always uses the correct Node version without needing manual input.
  - type: web
    name: brewbharat-console
    runtime: node
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build && cp -r public .next/standalone/ && cp -r .next/static .next/standalone/.next/
    startCommand: HOSTNAME=0.0.0.0 node .next/standalone/server.js
    healthCheckPath: /login
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.11.0"
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_WS_URL
        sync: false
