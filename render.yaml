# =============================================================================
# render.yaml — BrewBharat CRM — Render Blueprint (3 services)
# =============================================================================
# ALL values come from .env files / Render dashboard — nothing hardcoded here.
# Every  sync: false  var must be entered manually in Render dashboard.
# =============================================================================

services:

  # ── 1. CRM Backend (FastAPI) ──────────────────────────────────────────────
  - type: web
    name: brewbharat-crm-backend
    runtime: docker
    region: singapore
    plan: free
    rootDir: backend/crm-backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CHANNEL_SERVICE_URL
        sync: false
      - key: CHANNEL_HMAC_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AI_MODEL_FAST
        sync: false
      - key: AI_MODEL_SMART
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: ATTRIBUTION_WINDOW_HOURS
        sync: false

  # ── 2. Channel Service (FastAPI) ──────────────────────────────────────────
  - type: web
    name: brewbharat-channel-service
    runtime: docker
    region: singapore
    plan: free
    rootDir: backend/channel-service
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: CRM_CALLBACK_URL
        sync: false
      - key: HMAC_SECRET
        sync: false
      # PORT is injected by Render automatically — do not set it here

  # ── 3. Frontend (Next.js) ─────────────────────────────────────────────────
  - type: web
    name: brewbharat-console
    runtime: node
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build && cp -r public .next/standalone/ && cp -r .next/static .next/standalone/.next/
    startCommand: node .next/standalone/server.js
    healthCheckPath: /login
    envVars:
      - key: NODE_ENV
        sync: false
      - key: NODE_VERSION
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_WS_URL
        sync: false
