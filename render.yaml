# =============================================================================
# render.yaml — BrewBharat CRM — all 3 services in one Blueprint
# =============================================================================
# Deploy steps:
#   1. Push this repo to GitHub
#   2. Go to https://dashboard.render.com → New → Blueprint
#   3. Connect your GitHub repo — Render reads this file automatically
#   4. Fill in the "sync: false" env vars in the Render dashboard
# =============================================================================

services:

  # ── 1. CRM Backend (FastAPI) ──────────────────────────────────────────────
  - type: web
    name: brewbharat-crm-backend
    runtime: docker
    region: singapore
    plan: free
    rootDir: backend/crm-backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # Database — paste your Supabase connection string
      - key: DATABASE_URL
        sync: false

      # Redis — Render Redis add-on URL (or use Upstash free tier)
      - key: REDIS_URL
        sync: false

      # Channel service — fill in after channel-service is deployed
      - key: CHANNEL_SERVICE_URL
        sync: false
      - key: CHANNEL_HMAC_SECRET
        value: xeno-brewbharat-hmac-secret-32ch   # change before go-live

      # Auth
      - key: JWT_SECRET
        generateValue: true                         # Render generates a secure random value
      - key: ADMIN_EMAIL
        value: admin@xeno.local
      - key: ADMIN_PASSWORD_HASH
        sync: false                                 # bcrypt hash — see instructions below

      # AI
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AI_MODEL_FAST
        value: deepseek/deepseek-chat-v3-0324
      - key: AI_MODEL_SMART
        value: deepseek/deepseek-r1

      # CORS — add frontend URL after frontend is deployed
      - key: FRONTEND_ORIGINS
        sync: false

      # App
      - key: ATTRIBUTION_WINDOW_HOURS
        value: "72"

  # ── 2. Channel Service (FastAPI) ──────────────────────────────────────────
  - type: web
    name: brewbharat-channel-service
    runtime: docker
    region: singapore
    plan: free
    rootDir: backend/channel-service
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # CRM backend webhook — fill in after crm-backend is deployed
      - key: CRM_CALLBACK_URL
        sync: false    # e.g. https://brewbharat-crm-backend.onrender.com/api/v1/webhooks/channel-receipt
      - key: HMAC_SECRET
        value: xeno-brewbharat-hmac-secret-32ch   # must match CHANNEL_HMAC_SECRET above

  # ── 3. Frontend (Next.js) ────────────────────────────────────────────────
  - type: web
    name: brewbharat-console
    runtime: node
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build && cp -r public .next/standalone/ && cp -r .next/static .next/standalone/.next/
    startCommand: node .next/standalone/server.js
    healthCheckPath: /login
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      # Fill these in after backends are deployed:
      - key: NEXT_PUBLIC_API_URL
        sync: false    # e.g. https://brewbharat-crm-backend.onrender.com/api/v1
      - key: NEXT_PUBLIC_WS_URL
        sync: false    # e.g. wss://brewbharat-crm-backend.onrender.com
